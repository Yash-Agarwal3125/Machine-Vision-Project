name: Backend Tests

on:
  push:
    branches: [ feature/web-results-integration, main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verify Imports
      run: |
        cd backend
        python verify_imports.py # Assuming we keep this script or create a test script
    
    - name: Test Endpoints
      run: |
        # Start server in background
        nohup python backend/main.py &
        PID=$!
        sleep 15 # Wait for models to load
        
        # Run tests
        python backend/test_endpoints.py
        
        # Cleanup
        kill $PID
